<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Котики ищут дом</title>
</head>
<body>

<script>
const cats = [
  {"name":"Лара","gender":"girl","img_link":"https://www.friendforpet.ru/api/sites/default/files/2021-09/167200DD-A44F-4845-8D4D-ACCFC180165A.jpeg","age":8,"rate":7,"favourite":false,"description":"Лара – шотландская вислоухая, у нее остеохондродисплазия. Лара спокойная, очень ласковая и контактная. Болезнь не лечится и специального ухода не нужно.","id":1},
  {"name":"Базиль","gender":"boy","img_link":"https://www.friendforpet.ru/api/sites/default/files/2022-01/064AEBCB-45EC-4CE7-AB13-C65F10F00B7B.jpeg","age":2,"rate":10,"favourite":false,"description":"Внимательный, активный и ласковый. Любит играть, катать мяч, и мурчать на пледе рядом с людьми! Прилично воспитан, приучен к лотку. Вакцинирован, имеет ветеринарный паспорт.","id":2},
  {"name":"Риш","gender":"boy","img_link":"https://www.friendforpet.ru/api/sites/default/files/2022-01/_DM34706.JPG","age":1,"rate":10,"favourite":true,"description":"Риш любит лесенки, канаты. Очень активный и дружелюбный кот. Риш полностью здоров, привит, кастрирован. Использует лоточек и очень аккуратен.","id":3},
  {"name":"Элли","gender":"girl","img_link":"https://www.friendforpet.ru/api/sites/default/files/2022-01/1_25.jpg","age":4,"rate":8,"favourite":false,"description":"Элли обладает мягким и добрым характером. Очень любит всевозможные лакомства и вкусно покушать. Не доверяет людям, потребуется время, чтобы стать ей другом. Приучена к лотку и когтеточке","id":4},
  {"name":"Чарли","gender":"boy","img_link":"https://www.friendforpet.ru/api/sites/default/files/2022-01/%D0%BB%D0%B5%D0%B2%D0%B83_%D0%B0%D0%BB%D0%B5%D0%BA%D1%81.jpg","age":1,"rate":8,"favourite":false,"description":"Чёрно-белый юный котофилософ очень любит размышлять и быть наедине. Пока что не доверяет людям, не агрессивный. Ладит с другими животными, приучен к лотку и когтеточке","id":5},
  {"name":"Стефани","gender":"girl","img_link":"https://www.friendforpet.ru/api/sites/default/files/2022-01/4_30.jpg","age":6,"rate":9,"favourite":false,"description":"Прелестная Стефани – трогательная, добродушная и очень-очень общительная девочка как никто другой нуждается в заботе и любви. Приучена к лотку и когтеточке","id":6},
  {"name":"Дуся","gender":"girl","img_link":"https://www.friendforpet.ru/api/sites/default/files/2022-02/B1444207-6EE3-4BA4-97F7-2F9666AE2F63.jpeg","age":1,"rate":9,"favourite":false,"description":"Дусеньке около 1 года с небольшим, здорова, привита, стерилизована. Лоточек и когтеточку знает прекрасно. Очень общительная и нежная, хочет постоянного внимания.","id":7},
  {"name":"Бруно","gender":"boy","img_link":"https://www.friendforpet.ru/api/sites/default/files/2022-01/IMG-20211223-WA0049.jpg","age":1,"rate":10,"favourite":false,"description":"Очаровательный активный кот Бруно, находится в постоянном движении! Очаровательный и ласковый кот. Приучен к лотку, ладит с другими котами, привит.","id":8},
  {"name":"Светлячок","gender":"boy","img_link":"https://www.friendforpet.ru/api/sites/default/files/2022-01/%D1%81%D0%B2%D0%B5%D1%82%D0%BB%D1%8F%D1%87%D0%BE%D0%BA4_%D0%B0%D0%BB%D0%B5%D0%BA%D1%81.jpg","age":1,"rate":9,"favourite":true,"description":"Немного боязливый, но очень добрый и нежный кот Светлячок. Приучен к лотку и когтеточке, ладит с детьми, привит. Станет вам хорошим другом","id":9}
];

function yearWord(age) {
  if (age % 10 === 1 && age % 100 !== 11) return "год";
  if ([2,3,4].includes(age % 10) && ![12,13,14].includes(age % 100)) return "года";
  return "лет";
}

document.body.style.fontFamily = "'Segoe UI', Arial, sans-serif";
document.body.style.margin = "0";
document.body.style.padding = "30px";
document.body.style.background = "#f5f3ef";
document.body.style.color = "#2c2c2c";

const h1 = document.createElement("h1");
h1.textContent = "🐾 Котики ищут дом";
h1.style.textAlign = "center";
h1.style.marginBottom = "30px";
document.body.append(h1);

const grid = document.createElement("div");
grid.style.display = "grid";
grid.style.gridTemplateColumns = "repeat(auto-fill, minmax(280px, 1fr))";
grid.style.gap = "24px";
grid.style.maxWidth = "1200px";
grid.style.margin = "0 auto";
document.body.append(grid);

cats.forEach(cat => {
  const card = document.createElement("div");
  card.style.borderRadius = "14px";
  card.style.overflow = "hidden";
  card.style.boxShadow = "0 4px 14px rgba(0,0,0,0.08)";
  card.style.display = "flex";
  card.style.flexDirection = "column";
  card.style.background = cat.gender === "girl" ? "#ffe1ec" : "#dcebff";

  const img = document.createElement("img");
  img.src = cat.img_link;
  img.alt = cat.name;
  img.style.width = "100%";
  img.style.height = "220px";
  img.style.objectFit = "cover";
  card.append(img);

  const body = document.createElement("div");
  body.style.padding = "16px";
  body.style.display = "flex";
  body.style.flexDirection = "column";

  const title = document.createElement("h2");
  title.textContent = cat.name;
  title.style.margin = "0 0 6px";
  title.style.fontSize = "20px";

  if (cat.favourite) {
    const heart = document.createElement("span");
    heart.textContent = " ❤";
    heart.style.color = "#ffd11a";
    title.append(heart);
  }
  body.append(title);

  const meta = document.createElement("div");
  meta.textContent = "Возраст: " + cat.age + " " + yearWord(cat.age) + " · Рейтинг: " + cat.rate + "/10";
  meta.style.fontSize = "14px";
  meta.style.color = "#666";
  meta.style.marginBottom = "10px";
  body.append(meta);

  const desc = document.createElement("p");
  desc.textContent = cat.description;
  desc.style.fontSize = "14px";
  desc.style.lineHeight = "1.5";
  desc.style.margin = "0";
  body.append(desc);

  card.append(body);
  grid.append(card);
});
</script>

</body>
</html>
